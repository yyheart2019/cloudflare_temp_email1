name: Deploy Backend

on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        run: pnpm --version

      - name: Deploy Backend
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
          PNPM_ENABLE_BUILD_SCRIPTS: "true"
          DEBUG_MODE: ${{ secrets.DEBUG_MODE }}
          USE_WORKER_ASSETS: ${{ secrets.USE_WORKER_ASSETS }}
          USE_WORKER_ASSETS_WITH_TELEGRAM: ${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}
          BACKEND_USE_MAIL_WASM_PARSER: ${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}

        run: |
          set -e

          if [ -n "$USE_WORKER_ASSETS" ]; then
            cd frontend
            pnpm install --no-frozen-lockfile --allow-build=esbuild
            if [ -n "$USE_WORKER_ASSETS_WITH_TELEGRAM" ]; then
              pnpm build:telegram:pages
            else
              pnpm build:pages
            fi
            cd ..
          fi

          cd worker

          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml

          pnpm install --no-frozen-lockfile --allow-build=esbuild,sharp,workerd

          if [ -n "$BACKEND_USE_MAIL_WASM_PARSER" ]; then
            pnpm add mail-parser-wasm-worker
            git apply ../.github/config/mail-parser-wasm-worker.patch
          fi

          if [ "$DEBUG_MODE" = "true" ]; then
            pnpm run deploy
          else
            pnpm run deploy
          fi

          echo "Deploy completed"
